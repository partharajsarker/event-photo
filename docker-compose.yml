services:
  postgres:
    image: postgres:16-alpine
    container_name: event-photos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventphotos
      POSTGRES_PASSWORD: eventphotos
      POSTGRES_DB: eventphotos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventphotos -d eventphotos"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: event-photos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: event-photos-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'Waiting for MinIO...'; sleep 2; done;
      mc mb --ignore-existing local/event-photos;
      mc anonymous set download local/event-photos;
      exit 0;
      "

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: event-photos-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eventphotos:eventphotos@postgres:5432/eventphotos?schema=public
    command: npx prisma migrate deploy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-photos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://eventphotos:eventphotos@postgres:5432/eventphotos?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: event-photos
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_API_KEY: dev-admin-key-change-in-production
      MAX_UPLOAD_SIZE_MB: "50"
    command: node server.js

volumes:
  postgres_data:
  minio_data:
